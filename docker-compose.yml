services:
  api:
    build: .
    ports:
      - "8000:8080"
    environment:
      - PORT=8080
      - DB_URL=postgres://${DB_USER}:${DB_PASS}@db:5432/${DB_NAME}?sslmode=disable
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASS}
      - POSTGRES_DB=${DB_NAME}
    ports:
      - 5433:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
  
volumes:
  postgres_data: